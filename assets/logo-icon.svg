<!-- Fervon mark — DETAILED tier (icon / hero use, >=48px). Core 'f' geometry MATCHES favicon.svg exactly
     (same letterform path); this tier adds the ascending spark accents and ember glow. -->
<svg viewBox="0 0 148 155" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Fervon">
  <defs>
    <linearGradient id="fi-forge" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0" stop-color="#E0480F"/>
      <stop offset="0.5" stop-color="#FF6A00"/>
      <stop offset="1" stop-color="#FFB02E"/>
    </linearGradient>
    <linearGradient id="fi-spark" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#FF6A00"/>
      <stop offset="1" stop-color="#FFD37A"/>
    </linearGradient>
    <radialGradient id="fi-glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#FF6A00" stop-opacity="0.30"/>
      <stop offset="1" stop-color="#FF6A00" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <g transform="translate(8,12)">
    <ellipse cx="48" cy="70" rx="62" ry="62" fill="url(#fi-glow)"/>
    <g stroke="none">
      <!-- core 'f' — identical letterform to favicon.svg -->
      <path d="M58 6 C40 6 30 17 30 38 L30 48 L10 48 L10 70 L30 70 L30 116 C30 120 33 123 37 123 L51 123 C55 123 58 120 58 116 L58 70 L82 70 L82 48 L58 48 L58 38 C58 30 62 26 71 26 L86 26 L86 6 Z" fill="url(#fi-forge)"/>
    </g>
    <!-- ascending spark accents -->
    <circle cx="100" cy="22" r="5" fill="#FFD37A"/>
    <circle cx="116" cy="30" r="2.8" fill="#FF6A00"/>
    <path d="M86 30 L98 20" stroke="#FFB02E" stroke-width="3.2" stroke-linecap="round"/>
    <path d="M94 12 L99 2" stroke="#FF6A00" stroke-width="3.2" stroke-linecap="round"/>
    <path d="M108 14 L115 5" stroke="#FFB02E" stroke-width="3.2" stroke-linecap="round"/>
    <circle cx="104" cy="2" r="3" fill="#FFD37A"/>
    <circle cx="120" cy="6" r="2" fill="#FF8A2A"/>
  </g>
</svg>
